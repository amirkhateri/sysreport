name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate
        run: make check

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0

      - name: Build archive
        run: |
          version="$(cat VERSION)"
          archive="sysreport-${version}"
          mkdir -p "dist/${archive}/bin" "dist/${archive}/src/sysreport" "dist/${archive}/scripts/install"
          cp -R bin/sysreport "dist/${archive}/bin/"
          cp -R src/sysreport/core.sh src/sysreport/modules "dist/${archive}/src/sysreport/"
          cp scripts/install/install.sh scripts/install/uninstall.sh "dist/${archive}/scripts/install/"
          cp README.md LICENSE CHANGELOG.md CONTRIBUTING.md SECURITY.md VERSION package.json nfpm.yaml "dist/${archive}/"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
          rm -rf "dist/${archive}"

      - name: Build Linux packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="$(cat VERSION)"
          export VERSION="$version"
          nfpm package --packager rpm --target dist/
          nfpm package --packager deb --target dist/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(cat VERSION)"
          gh release create "v${version}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "SysReport v${version}" \
            --notes-file CHANGELOG.md

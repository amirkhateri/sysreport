name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Show Version
        run: |
          echo "Building version $VERSION"